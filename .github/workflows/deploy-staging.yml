name: Deploy Frontend (Next.js)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      DEPLOY_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
      DEPLOY_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      DEPLOY_KEY: ${{ secrets.SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.APP_PATH || vars.APP_PATH }}

    steps:
      - name: Validate deploy configuration
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "::error title=Missing deploy host::Set repository secret SSH_HOST or repository variable SSH_HOST."
            exit 1
          fi

          if [ -z "${DEPLOY_USER}" ]; then
            echo "::error title=Missing deploy user::Set repository secret SSH_USER or repository variable SSH_USER."
            exit 1
          fi

          if [ -z "${DEPLOY_KEY}" ]; then
            echo "::error title=Missing deploy key::Set repository secret SSH_KEY."
            exit 1
          fi

          if [ -z "${DEPLOY_PATH}" ]; then
            echo "::error title=Missing app path::Set repository secret APP_PATH or repository variable APP_PATH."
            exit 1
          fi

      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          port: ${{ env.DEPLOY_PORT }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            set -euo pipefail

            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh"
            nvm use 22

            cd "${{ env.DEPLOY_PATH }}"

            git fetch --all --prune
            git reset --hard origin/main

            npm ci
            npm run build

            if ! command -v pm2 >/dev/null 2>&1; then
              npm i -g pm2
            fi

            pm2 reload "next-app" || pm2 restart "next-app-frontend"
            pm2 save || true
