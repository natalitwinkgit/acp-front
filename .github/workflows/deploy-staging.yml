name: Build and Deploy Frontend (Next.js)

on:
  push:
    branches: ["main"]

jobs:
  prepare_deploy:
    name: Check Deploy Config
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      DEPLOY_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
      DEPLOY_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      DEPLOY_KEY: ${{ secrets.SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.APP_PATH || vars.APP_PATH }}
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
      missing: ${{ steps.check.outputs.missing }}

    steps:
      - name: Check SSH variables
        id: check
        run: |
          set -euo pipefail

          missing=()

          [ -n "${DEPLOY_HOST}" ] || missing+=("SSH_HOST")
          [ -n "${DEPLOY_USER}" ] || missing+=("SSH_USER")
          [ -n "${DEPLOY_KEY}" ] || missing+=("SSH_KEY")
          [ -n "${DEPLOY_PATH}" ] || missing+=("APP_PATH")

          if [ ${#missing[@]} -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "SSH deploy is enabled."
          else
            missing_csv=$(IFS=,; echo "${missing[*]}")
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing_csv}" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skipping SSH deploy::Missing deploy config: ${missing_csv}. Build job will still run."
          fi

  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: [prepare_deploy, build]
    if: needs.prepare_deploy.outputs.can_deploy == 'true'
    env:
      DEPLOY_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      DEPLOY_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
      DEPLOY_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      DEPLOY_KEY: ${{ secrets.SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.APP_PATH || vars.APP_PATH }}

    steps:
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          port: ${{ env.DEPLOY_PORT }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            set -euo pipefail

            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh"
            nvm use 22

            cd "${{ env.DEPLOY_PATH }}"

            git fetch --all --prune
            git reset --hard origin/main

            npm ci
            npm run build

            if ! command -v pm2 >/dev/null 2>&1; then
              npm i -g pm2
            fi

            if pm2 describe "next-app" >/dev/null 2>&1; then
              pm2 reload "next-app"
            else
              pm2 start ecosystem.config.cjs --only next-app
            fi

            pm2 save || true
